{% extends "base.html" %}
{% block content %}
<h2>Students Details</h2>
<div class="container">
    <table class="students-table" border="1" cellspacing="0" cellpadding="5">
        <thead>
            <tr>
                <th>Name</th>
                <th>Roll No</th>
            </tr>
        </thead>
        <tbody>
            {% for student in students %}
            <tr>
                <td>{{ student['NAME'] }}</td>
                <td>{{ student['ROLL NO'] }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
